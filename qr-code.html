<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code for Caroline 💖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0a2e,#16213e,#0f3460);font-family:'Segoe UI',sans-serif;color:#f8f0fc;overflow:hidden}
.container{text-align:center;padding:40px;position:relative;z-index:2}
h1{font-size:2rem;margin-bottom:8px;background:linear-gradient(135deg,#f0c27f,#fc5c7d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#e8a0bf;font-size:1.1rem;margin-bottom:30px}
.heart-wrapper{position:relative;display:inline-block;margin:0 auto 30px}
.heart-frame{position:relative;width:340px;height:340px;display:flex;align-items:center;justify-content:center}
.heart-frame::before{content:'';position:absolute;inset:-20px;background:none;border:3px solid rgba(240,194,127,0.3);clip-path:path('M 170 300 C 70 250, -30 150, 30 80 C 70 30, 130 30, 170 80 C 210 30, 270 30, 310 80 C 370 150, 270 250, 170 300 Z');transform:scale(1.15) translate(-2px,-10px)}
.heart-bg{position:absolute;inset:-10px;background:linear-gradient(135deg,rgba(232,160,191,0.1),rgba(240,194,127,0.1));clip-path:path('M 170 300 C 70 250, -30 150, 30 80 C 70 30, 130 30, 170 80 C 210 30, 270 30, 310 80 C 370 150, 270 250, 170 300 Z');transform:scale(1.1) translate(-2px,-10px)}
canvas{border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.4);position:relative;z-index:2}
.scan-text{color:#b8b0c8;font-size:0.95rem;margin-top:15px;letter-spacing:1px}
.scan-text span{color:#f0c27f}
.url-text{color:#c77dff;font-size:0.8rem;margin-top:10px;word-break:break-all;opacity:0.7}
.download-btn{display:inline-block;margin-top:25px;padding:14px 40px;border:2px solid #f0c27f;border-radius:50px;background:transparent;color:#f0c27f;font-size:1rem;cursor:pointer;transition:all 0.3s;text-decoration:none;font-weight:500}
.download-btn:hover{background:#f0c27f;color:#1a0a2e;box-shadow:0 8px 30px rgba(240,194,127,0.4)}
.floating{position:fixed;font-size:1.5rem;opacity:0.1;animation:float linear infinite;pointer-events:none;z-index:1}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.1}90%{opacity:0.1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
.corner-heart{position:fixed;font-size:2rem;opacity:0.15;animation:pulse2 3s ease infinite}
.corner-heart:nth-child(1){top:30px;left:30px}
.corner-heart:nth-child(2){top:30px;right:30px;animation-delay:0.5s}
.corner-heart:nth-child(3){bottom:30px;left:30px;animation-delay:1s}
.corner-heart:nth-child(4){bottom:30px;right:30px;animation-delay:1.5s}
@keyframes pulse2{0%,100%{transform:scale(1);opacity:0.15}50%{transform:scale(1.3);opacity:0.3}}
.note{margin-top:20px;padding:15px 25px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.85rem;color:#b8b0c8;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.5}
.note strong{color:#e8a0bf}
</style>
</head>
<body>
<div class="corner-heart">💖</div>
<div class="corner-heart">💕</div>
<div class="corner-heart">💗</div>
<div class="corner-heart">💝</div>

<div class="container">
    <h1>🎓 Scan Me, Caroline! 💖</h1>
    <p class="subtitle">A special surprise awaits you...</p>
    
    <div class="heart-wrapper">
        <div class="heart-frame">
            <div class="heart-bg"></div>
            <canvas id="qrCanvas" width="280" height="280"></canvas>
        </div>
    </div>
    
    <p class="scan-text">Scan with your phone camera to <span>open your surprise</span></p>
    <p class="url-text">itsmexavv.github.io/carolines-graduation</p>
    
    <button class="download-btn" id="downloadBtn">💾 Save QR Code as Image</button>
    
    <div class="note">
        <strong>💡 Tip:</strong> Print this page or screenshot the QR code and give it to Caroline. When she scans it, the surprise opens!
    </div>
</div>

<script>
// Simple QR Code generator (QR Code Model 2, Error Correction Level H)
// Minimal implementation for URL encoding
(function(){
const URL = 'https://itsmexavv.github.io/carolines-graduation/';

// Use a third-party QR library via dynamic script load
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
script.onload = function() {
    const qr = qrcode(0, 'H'); // Type 0 = auto, H = high error correction (30%)
    qr.addData(URL);
    qr.make();
    
    const canvas = document.getElementById('qrCanvas');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const moduleCount = qr.getModuleCount();
    const cellSize = size / (moduleCount + 8); // padding
    const offset = (size - cellSize * moduleCount) / 2;
    
    // Background
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, 16);
    ctx.fill();
    
    // Draw QR modules as tiny hearts
    for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
                const x = offset + col * cellSize + cellSize / 2;
                const y = offset + row * cellSize + cellSize / 2;
                const s = cellSize * 0.55;
                
                // Check if this is part of a finder pattern (corners)
                const isFinderPattern = 
                    (row < 7 && col < 7) || 
                    (row < 7 && col >= moduleCount - 7) || 
                    (row >= moduleCount - 7 && col < 7);
                
                if (isFinderPattern) {
                    // Draw finder patterns as rounded squares for scannability
                    ctx.fillStyle = '#1a0a2e';
                    ctx.fillRect(
                        offset + col * cellSize + 0.5, 
                        offset + row * cellSize + 0.5, 
                        cellSize - 1, cellSize - 1
                    );
                } else {
                    // Draw data modules as mini hearts
                    ctx.fillStyle = '#e74c8b';
                    drawMiniHeart(ctx, x, y, s);
                }
            }
        }
    }
    
    // Draw a small heart in the center of the QR code
    const centerX = size / 2;
    const centerY = size / 2;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(centerX, centerY, cellSize * 3.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#e74c8b';
    drawHeart(ctx, centerX, centerY - 2, cellSize * 2.5);
};
document.head.appendChild(script);

function drawMiniHeart(ctx, x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    const s = size;
    ctx.moveTo(0, s * 0.4);
    ctx.bezierCurveTo(-s * 0.1, -s * 0.1, -s * 0.6, -s * 0.1, -s * 0.6, s * 0.15);
    ctx.bezierCurveTo(-s * 0.6, s * 0.45, 0, s * 0.7, 0, s * 0.7);
    ctx.bezierCurveTo(0, s * 0.7, s * 0.6, s * 0.45, s * 0.6, s * 0.15);
    ctx.bezierCurveTo(s * 0.6, -s * 0.1, s * 0.1, -s * 0.1, 0, s * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawHeart(ctx, x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    const s = size;
    // Simple heart shape
    ctx.moveTo(0, s * 0.3);
    ctx.bezierCurveTo(0, -s * 0.2, -s * 0.7, -s * 0.5, -s * 0.7, s * 0);
    ctx.bezierCurveTo(-s * 0.7, s * 0.4, 0, s * 0.8, 0, s);
    ctx.bezierCurveTo(0, s * 0.8, s * 0.7, s * 0.4, s * 0.7, s * 0);
    ctx.bezierCurveTo(s * 0.7, -s * 0.5, 0, -s * 0.2, 0, s * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

// Download button
document.getElementById('downloadBtn').addEventListener('click', function() {
    const canvas = document.getElementById('qrCanvas');
    // Create a larger canvas for download with heart border
    const dlCanvas = document.createElement('canvas');
    dlCanvas.width = 500;
    dlCanvas.height = 600;
    const dlCtx = dlCanvas.getContext('2d');
    
    // Background
    dlCtx.fillStyle = '#1a0a2e';
    dlCtx.fillRect(0, 0, 500, 600);
    
    // Title
    dlCtx.fillStyle = '#f0c27f';
    dlCtx.font = 'bold 24px Segoe UI';
    dlCtx.textAlign = 'center';
    dlCtx.fillText('🎓 Scan Me, Caroline! 💖', 250, 50);
    
    dlCtx.fillStyle = '#e8a0bf';
    dlCtx.font = '16px Segoe UI';
    dlCtx.fillText('A special surprise awaits you...', 250, 80);
    
    // QR Code
    const qrSize = 300;
    const qrX = (500 - qrSize) / 2;
    dlCtx.drawImage(canvas, qrX, 110, qrSize, qrSize);
    
    // Border around QR
    dlCtx.strokeStyle = '#f0c27f';
    dlCtx.lineWidth = 3;
    dlCtx.beginPath();
    dlCtx.roundRect(qrX - 10, 100, qrSize + 20, qrSize + 20, 20);
    dlCtx.stroke();
    
    // Bottom text
    dlCtx.fillStyle = '#b8b0c8';
    dlCtx.font = '14px Segoe UI';
    dlCtx.fillText('Scan with your phone camera', 250, 460);
    
    dlCtx.fillStyle = '#c77dff';
    dlCtx.font = '12px Segoe UI';
    dlCtx.fillText('itsmexavv.github.io/carolines-graduation', 250, 490);
    
    dlCtx.fillStyle = '#e8a0bf';
    dlCtx.font = '20px Segoe UI';
    dlCtx.fillText('💕 Made with love by Xavier 💕', 250, 540);
    
    // Download
    const link = document.createElement('a');
    link.download = 'carolines-surprise-qr.png';
    link.href = dlCanvas.toDataURL('image/png');
    link.click();
});

// Floating elements
const emojis = ['💖','💕','🎓','✨','⭐','💫','🌟','💝'];
for(let i = 0; i < 12; i++){
    const el = document.createElement('div');
    el.className = 'floating';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = (15+Math.random()*15)+'s';
    el.style.animationDelay = (Math.random()*20)+'s';
    document.body.appendChild(el);
}
})();
</script>
</body>
</html>
