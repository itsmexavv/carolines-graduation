<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Scan Me, Caroline!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Inter',sans-serif;overflow:hidden}

/* Animated background particles */
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;background:rgba(240,194,127,0.15);animation:drift 20s linear infinite}
@keyframes drift{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

.container{position:relative;z-index:2;text-align:center}

/* Main card */
.card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:30px;padding:45px 40px;max-width:420px;margin:0 auto;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(240,194,127,0.05),transparent,rgba(232,160,191,0.05),transparent);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card-inner{position:relative;z-index:2}

/* Large decorative heart behind QR */
.deco-heart{position:absolute;top:50%;left:50%;transform:translate(-50%,-48%);z-index:1;opacity:0.06}
.deco-heart svg{width:350px;height:350px}

/* Title */
.title{font-family:'Playfair Display',serif;font-size:1.6rem;color:#f8f0fc;margin-bottom:4px;font-weight:700}
.title-emoji{font-size:1.4rem}
.subtitle{font-family:'Dancing Script',cursive;font-size:1.3rem;color:#e8a0bf;margin-bottom:30px}

/* QR wrapper with glow */
.qr-wrap{position:relative;display:inline-block;padding:16px;background:white;border-radius:18px;box-shadow:0 0 40px rgba(231,76,139,0.15),0 10px 30px rgba(0,0,0,0.2);margin-bottom:20px}
.qr-wrap::after{content:'';position:absolute;inset:-3px;border-radius:20px;background:linear-gradient(135deg,#f0c27f,#e74c8b,#c77dff,#f0c27f);z-index:-1;animation:borderGlow 3s ease infinite}
@keyframes borderGlow{0%,100%{opacity:0.6}50%{opacity:1}}
canvas{display:block;border-radius:10px}

/* Heart badge on QR */
.heart-badge{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#e74c8b,#c62368);color:white;padding:5px 18px;border-radius:20px;font-family:'Dancing Script',cursive;font-size:0.95rem;white-space:nowrap;box-shadow:0 4px 15px rgba(231,76,139,0.4);border:2px solid rgba(255,255,255,0.2)}

/* Divider hearts */
.heart-divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:25px 0 15px;opacity:0.5}
.heart-divider .line{width:50px;height:1px;background:linear-gradient(90deg,transparent,#f0c27f,transparent)}
.heart-divider .heart{color:#e74c8b;font-size:0.9rem;animation:pulse2 2s ease infinite}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* Info text */
.scan-text{color:#b8b0c8;font-size:0.9rem;letter-spacing:0.5px}
.scan-text strong{color:#f0c27f}
.url-text{color:#c77dff;font-size:0.7rem;margin-top:6px;opacity:0.5;letter-spacing:1px}

/* Floating hearts around card */
.float-hearts{position:absolute;inset:-40px;pointer-events:none;z-index:0}
.fh{position:absolute;animation:floatH 4s ease-in-out infinite}
@keyframes floatH{0%,100%{transform:translateY(0) scale(1);opacity:0.3}50%{transform:translateY(-15px) scale(1.15);opacity:0.7}}

/* Button */
.btn-row{margin-top:25px}
.btn{padding:13px 38px;border:2px solid rgba(240,194,127,0.4);border-radius:50px;background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);color:#f0c27f;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px}
.btn:hover{background:linear-gradient(135deg,#f0c27f,#fc5c7d);color:#1a0a2e;border-color:transparent;box-shadow:0 8px 25px rgba(240,194,127,0.4);transform:translateY(-2px)}

/* Signature */
.signature{margin-top:20px;font-family:'Dancing Script',cursive;font-size:1.1rem;color:#e8a0bf;opacity:0.7}
</style>
</head>
<body>

<div class="bg-particles" id="bgP"></div>

<div class="container">
    <div class="card">
        <!-- Decorative heart behind -->
        <div class="deco-heart">
            <svg viewBox="0 0 100 100"><path d="M50 88 C25 65, 0 45, 8 25 C14 10, 30 5, 40 5 C46 5, 50 12, 50 18 C50 12, 54 5, 60 5 C70 5, 86 10, 92 25 C100 45, 75 65, 50 88Z" fill="#e74c8b"/></svg>
        </div>

        <!-- Floating hearts -->
        <div class="float-hearts">
            <span class="fh" style="top:10%;left:5%;font-size:1rem;animation-delay:0s">💖</span>
            <span class="fh" style="top:8%;right:8%;font-size:0.8rem;animation-delay:0.7s">✨</span>
            <span class="fh" style="bottom:15%;left:8%;font-size:0.9rem;animation-delay:1.4s">💕</span>
            <span class="fh" style="bottom:12%;right:5%;font-size:1.1rem;animation-delay:0.3s">💗</span>
            <span class="fh" style="top:45%;left:2%;font-size:0.7rem;animation-delay:2s">⭐</span>
            <span class="fh" style="top:40%;right:2%;font-size:0.8rem;animation-delay:1s">🌟</span>
        </div>

        <div class="card-inner">
            <p class="title"><span class="title-emoji">🎓</span> Scan Me, Caroline!</p>
            <p class="subtitle">A surprise awaits you 💖</p>

            <div class="qr-wrap">
                <canvas id="c" width="240" height="240"></canvas>
                <div class="heart-badge">💕 For You, Baby</div>
            </div>

            <div class="heart-divider">
                <div class="line"></div>
                <span class="heart">❤</span>
                <div class="line"></div>
            </div>

            <p class="scan-text">Scan with your camera to <strong>open your surprise</strong></p>
            <p class="url-text">itsmexavv.github.io/carolines-graduation</p>

            <div class="btn-row">
                <button class="btn" onclick="dl()">💾 Save QR Image</button>
            </div>

            <p class="signature">with love, Xavier 💕</p>
        </div>
    </div>
</div>

<script>
// Background particles
const bgP = document.getElementById('bgP');
for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.width=p.style.height=(Math.random()*4+1)+'px';
    p.style.animationDuration=(15+Math.random()*20)+'s';
    p.style.animationDelay=(Math.random()*20)+'s';
    bgP.appendChild(p);
}

// Generate QR
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const qr=qrcode(0,'H');
qr.addData('https://itsmexavv.github.io/carolines-graduation/');
qr.make();
const mc=qr.getModuleCount(),W=canvas.width;
const cell=W/(mc+4),off=(W-cell*mc)/2;

ctx.fillStyle='#fff';
ctx.fillRect(0,0,W,W);

for(let r=0;r<mc;r++){
    for(let c2=0;c2<mc;c2++){
        if(!qr.isDark(r,c2))continue;
        const x=off+c2*cell,y=off+r*cell;
        const isFinder=(r<7&&c2<7)||(r<7&&c2>=mc-7)||(r>=mc-7&&c2<7);
        ctx.fillStyle=isFinder?'#1a0a2e':'#c62368';
        const g=cell*0.12;
        ctx.beginPath();
        ctx.roundRect(x+g,y+g,cell-g*2,cell-g*2,cell*0.28);
        ctx.fill();
    }
}

// Heart in center
const cx=W/2,cy=W/2,s=cell*2.2;
ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(cx,cy,s+4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#e74c8b';
ctx.save();ctx.translate(cx,cy-s*0.15);
ctx.beginPath();
ctx.moveTo(0,s*0.45);
ctx.bezierCurveTo(-s*0.1,s*0.1,-s*0.9,-s*0.35,0,-s*0.65);
ctx.bezierCurveTo(s*0.9,-s*0.35,s*0.1,s*0.1,0,s*0.45);
ctx.fill();ctx.restore();

// Download
function dl(){
    const d=document.createElement('canvas');d.width=520;d.height=620;
    const dc=d.getContext('2d');
    // BG
    const bg=dc.createLinearGradient(0,0,520,620);
    bg.addColorStop(0,'#1a0a2e');bg.addColorStop(1,'#0f3460');
    dc.fillStyle=bg;dc.fillRect(0,0,520,620);
    // Card bg
    dc.fillStyle='rgba(255,255,255,0.05)';
    dc.beginPath();dc.roundRect(30,30,460,560,30);dc.fill();
    dc.strokeStyle='rgba(255,255,255,0.1)';dc.lineWidth=1;
    dc.beginPath();dc.roundRect(30,30,460,560,30);dc.stroke();
    // Title
    dc.fillStyle='#f8f0fc';dc.font='bold 24px Playfair Display,serif';dc.textAlign='center';
    dc.fillText('🎓 Scan Me, Caroline!',260,85);
    dc.fillStyle='#e8a0bf';dc.font='22px Dancing Script,cursive';
    dc.fillText('A surprise awaits you 💖',260,115);
    // QR with border glow
    const qrS=280,qrX=(520-qrS)/2,qrY=140;
    dc.shadowColor='rgba(231,76,139,0.3)';dc.shadowBlur=20;
    dc.fillStyle='#fff';dc.beginPath();dc.roundRect(qrX-8,qrY-8,qrS+16,qrS+16,18);dc.fill();
    dc.shadowBlur=0;
    dc.drawImage(canvas,qrX,qrY,qrS,qrS);
    // Badge
    dc.fillStyle='#e74c8b';dc.beginPath();dc.roundRect(180,qrY+qrS-2,160,30,15);dc.fill();
    dc.fillStyle='#fff';dc.font='14px Dancing Script,cursive';
    dc.fillText('💕 For You, Baby',260,qrY+qrS+18);
    // Divider
    dc.strokeStyle='rgba(240,194,127,0.3)';dc.lineWidth=1;
    dc.beginPath();dc.moveTo(140,470);dc.lineTo(380,470);dc.stroke();
    dc.fillStyle='#e74c8b';dc.font='14px serif';dc.fillText('❤',260,474);
    // Info
    dc.fillStyle='#b8b0c8';dc.font='13px Inter,sans-serif';
    dc.fillText('Scan with your camera to open the surprise',260,500);
    dc.fillStyle='rgba(199,125,255,0.5)';dc.font='10px Inter,sans-serif';
    dc.fillText('itsmexavv.github.io/carolines-graduation',260,520);
    // Signature
    dc.fillStyle='#e8a0bf';dc.font='18px Dancing Script,cursive';
    dc.fillText('with love, Xavier 💕',260,560);
    // Save
    const a=document.createElement('a');a.download='carolines-surprise-qr.png';
    a.href=d.toDataURL('image/png');a.click();
}
</script>
</body>
</html>
