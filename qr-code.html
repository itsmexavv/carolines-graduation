<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code for Caroline 💖</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5e6f0;font-family:'Segoe UI',sans-serif}
.page{text-align:center;padding:20px}
.heart-card{position:relative;width:480px;height:440px;margin:0 auto 20px;filter:drop-shadow(0 20px 40px rgba(200,50,100,0.3))}
.heart-shape{width:100%;height:100%;background:linear-gradient(135deg,#e74c8b,#c62368,#a01050);clip-path:path('M 240 400 C 120 340, -20 220, 20 130 C 50 60, 120 30, 170 30 C 210 30, 235 55, 240 80 C 245 55, 270 30, 310 30 C 360 30, 430 60, 460 130 C 500 220, 360 340, 240 400 Z');display:flex;align-items:center;justify-content:center;padding-top:30px}
.qr-inner{background:#fff;border-radius:16px;padding:12px;box-shadow:0 5px 20px rgba(0,0,0,0.2)}
.qr-inner canvas{display:block;border-radius:8px}
.heart-text{position:absolute;top:28px;left:50%;transform:translateX(-50%);color:#fff;font-size:1rem;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,0.3);white-space:nowrap;letter-spacing:1px}
.heart-text-bottom{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);color:#fff;font-family:'Segoe UI';font-size:.85rem;text-shadow:0 2px 8px rgba(0,0,0,0.3);white-space:nowrap;opacity:.9}
.title{font-size:1.6rem;color:#c62368;font-weight:700;margin-bottom:4px}
.sub{color:#e74c8b;margin-bottom:15px;font-size:.95rem}
.info{color:#888;font-size:.85rem;margin-top:8px}
.info span{color:#c62368;font-weight:600}
.url{color:#a01050;font-size:.7rem;opacity:.5;margin-top:4px}
.btn{margin-top:15px;padding:12px 36px;border:2px solid #e74c8b;border-radius:50px;background:#fff;color:#e74c8b;font-size:.95rem;cursor:pointer;transition:.3s;font-weight:600}
.btn:hover{background:#e74c8b;color:#fff}
.mini-hearts{position:absolute;pointer-events:none}
.mini-hearts span{position:absolute;animation:floatheart 3s ease-in-out infinite}
@keyframes floatheart{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-10px) scale(1.2);opacity:1}}
</style>
</head>
<body>
<div class="page">
    <p class="title">🎓 Scan Me, Caroline!</p>
    <p class="sub">A surprise awaits you 💖</p>
    <div class="heart-card">
        <div class="heart-shape">
            <div class="qr-inner">
                <canvas id="c" width="220" height="220"></canvas>
            </div>
        </div>
        <span class="heart-text">💕 For You, Baby 💕</span>
        <span class="heart-text-bottom">with love, Xavier</span>
        <div class="mini-hearts">
            <span style="top:60px;left:30px;font-size:1.2rem;animation-delay:0s">💖</span>
            <span style="top:50px;right:30px;font-size:1rem;animation-delay:.5s">💕</span>
            <span style="top:180px;left:10px;font-size:.9rem;animation-delay:1s">✨</span>
            <span style="top:170px;right:10px;font-size:1.1rem;animation-delay:1.5s">💗</span>
            <span style="bottom:80px;left:50px;font-size:.8rem;animation-delay:.8s">⭐</span>
            <span style="bottom:75px;right:50px;font-size:1rem;animation-delay:1.2s">💝</span>
        </div>
    </div>
    <p class="info">Scan with your phone camera to <span>open the surprise</span></p>
    <p class="url">itsmexavv.github.io/carolines-graduation</p>
    <button class="btn" onclick="dl()">💾 Save as Image</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const qr = qrcode(0, 'H');
qr.addData('https://itsmexavv.github.io/carolines-graduation/');
qr.make();
const mc = qr.getModuleCount();
const W = canvas.width;
const cell = W / (mc + 4);
const off = (W - cell * mc) / 2;

// White bg
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, W, W);

// Draw modules
for (let r = 0; r < mc; r++) {
    for (let co = 0; co < mc; co++) {
        if (!qr.isDark(r, co)) continue;
        const x = off + co * cell;
        const y = off + r * cell;
        const isFinder = (r < 7 && co < 7) || (r < 7 && co >= mc-7) || (r >= mc-7 && co < 7);
        if (isFinder) {
            ctx.fillStyle = '#c62368';
        } else {
            ctx.fillStyle = '#e74c8b';
        }
        const pad = 0.4;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, cell - pad*2, cell - pad*2, cell * 0.25);
        ctx.fill();
    }
}

// Heart in center
const cx = W/2, cy = W/2, hs = cell * 2;
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.arc(cx, cy, hs + 3, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#e74c8b';
ctx.save(); ctx.translate(cx, cy - 2);
ctx.beginPath();
ctx.moveTo(0, hs*0.35);
ctx.bezierCurveTo(-hs*0.05, hs*0.05, -hs, -hs*0.4, 0, -hs*0.8);
ctx.bezierCurveTo(hs, -hs*0.4, hs*0.05, hs*0.05, 0, hs*0.35);
ctx.fill(); ctx.restore();

// Download function
function dl(){
    const d = document.createElement('canvas');
    d.width = 600; d.height = 600;
    const dc = d.getContext('2d');
    // Draw heart background
    dc.fillStyle = '#f5e6f0';
    dc.fillRect(0, 0, 600, 600);
    // Heart
    dc.save();
    dc.translate(300, 280);
    const s = 260;
    dc.beginPath();
    dc.moveTo(0, s*0.55);
    dc.bezierCurveTo(-s*0.05, s*0.2, -s*1.05, -s*0.3, 0, -s*0.7);
    dc.bezierCurveTo(s*1.05, -s*0.3, s*0.05, s*0.2, 0, s*0.55);
    dc.closePath();
    const g = dc.createLinearGradient(-s, -s, s, s);
    g.addColorStop(0, '#e74c8b'); g.addColorStop(1, '#c62368');
    dc.fillStyle = g; dc.fill();
    dc.restore();
    // QR on heart
    dc.drawImage(canvas, 190, 165, 220, 220);
    // Border around QR
    dc.strokeStyle = '#fff'; dc.lineWidth = 4;
    dc.beginPath(); dc.roundRect(184, 159, 232, 232, 18); dc.stroke();
    // Top text
    dc.fillStyle = '#fff'; dc.font = 'bold 16px Segoe UI'; dc.textAlign = 'center';
    dc.fillText('💕 For You, Baby 💕', 300, 148);
    // Bottom text
    dc.fillStyle = '#fff'; dc.font = '13px Segoe UI';
    dc.fillText('with love, Xavier', 300, 415);
    // Title
    dc.fillStyle = '#c62368'; dc.font = 'bold 20px Segoe UI';
    dc.fillText('🎓 Scan Me, Caroline! 💖', 300, 40);
    dc.fillStyle = '#e74c8b'; dc.font = '14px Segoe UI';
    dc.fillText('A surprise awaits you...', 300, 65);
    // Bottom info
    dc.fillStyle = '#888'; dc.font = '12px Segoe UI';
    dc.fillText('Scan with your phone camera', 300, 520);
    dc.fillStyle = '#a01050'; dc.font = '10px Segoe UI';
    dc.fillText('itsmexavv.github.io/carolines-graduation', 300, 540);
    dc.fillStyle = '#e74c8b'; dc.font = '16px Segoe UI';
    dc.fillText('💕 Made with love 💕', 300, 575);
    // Save
    const a = document.createElement('a');
    a.download = 'carolines-surprise-qr.png';
    a.href = d.toDataURL('image/png');
    a.click();
}
</script>
</body>
</html>
